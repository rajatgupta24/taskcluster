apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: taskcluster-gateway
  labels: {$eval: labels}
spec:
  gatewayClassName: '{{ .Values.gatewayClassName | default "nginx" }}'
  addresses:
  - type: NamedAddress
    value: '{{ .Values.gatewayStaticIpName | default "" }}'
  listeners:
  - name: https
    port: 443
    protocol: HTTPS
    hostname: '{{ substr 8 -1 (trimSuffix "/" .Values.rootUrl) }}'
    tls:
      mode: Terminate
      options:
        networking.gke.io/cert-manager-certs: '{{ .Values.gcpManagedCertName | default "" }}'
    allowedRoutes:
      namespaces:
        from: Same
  - name: http
    port: 80
    protocol: HTTP
    hostname: '{{ substr 8 -1 (trimSuffix "/" .Values.rootUrl) }}'
    allowedRoutes:
      namespaces:
        from: Same
