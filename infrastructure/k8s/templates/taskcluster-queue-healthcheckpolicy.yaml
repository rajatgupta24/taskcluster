{{- if not (has "healthcheckpolicy" .Values.skipResourceTypes) -}}
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: taskcluster-queue-hc
  labels:
    app.kubernetes.io/name: taskcluster-queue-hc
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/component: taskcluster-queue-hc-healthcheckpolicy
    app.kubernetes.io/part-of: taskcluster
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /api/queue/v1/ping
        port: 8080
  targetRef:
    group: ''
    kind: Service
    name: taskcluster-queue
{{- end }}
